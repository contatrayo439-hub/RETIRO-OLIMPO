<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cómo retirar</title>

<style>
body {
    margin: 0;
    background: black;
    text-align: center;
}

img {
    width: 100%;
    height: auto;
}

.volver {
    position: fixed;
    top: 15px;
    left: 15px;
    background: gold;
    color: black;
    padding: 10px 15px;
    border-radius: 10px;
    font-weight: bold;
    text-decoration: none;
    z-index: 1000;
}

.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
    text-decoration: none;
    box-shadow: 0 0 15px rgba(0,0,0,0.6);
}
.btn-volver {
    position: fixed;
    top: 15px;
    left: 15px;

    width: 50px;
    height: 50px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 20px;
    font-weight: bold;

    color: black;
    text-decoration: none;

    border-radius: 50%;

    background: linear-gradient(135deg, #ffd700, #ff8c00);

    box-shadow:
        0 0 15px gold,
        0 0 40px orange,
        inset 0 0 8px rgba(255,255,255,0.6);

    z-index: 999;

    transition: 0.3s;
}

/* BRILLO */
.btn-volver::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.7), transparent);
    opacity: 0;
}

.btn-volver:hover::before {
    opacity: 1;
    animation: shine 0.5s;
}

@keyframes shine {
    from { transform: translateX(-100%); }
    to { transform: translateX(100%); }
}

/* HOVER */
.btn-volver:hover {
    transform: scale(1.1);
    box-shadow:
        0 0 25px gold,
        0 0 60px orange;
}
</style>
</head>

<body>

<a href="index.html" class="btn-volver fijo">
    ⬅
</a>

<img src="como retirar.jpg">

</body>
</html>
