<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cómo retirar</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    font-family:'Poppins',sans-serif;

    background:black;

    overflow-x:hidden;

    opacity:0;
    transition:0.4s ease;
}

body.loaded{
    opacity:1;
}

/* OVERLAY */

body::before{
    content:"";

    position:fixed;
    inset:0;

    background:
rgba(255,215,0,0.12);

backdrop-filter:blur(10px);

border:2px solid rgba(255,215,0,0.25);

    z-index:-2;
}

/* PARTICLES */

.particles{
    position:fixed;
    inset:0;

    pointer-events:none;

    background-image:
    radial-gradient(rgba(255,215,0,0.3) 1px, transparent 1px);

    background-size:35px 35px;

    opacity:0.16;

    animation:particlesMove 18s linear infinite;

    z-index:-1;
}

@keyframes particlesMove{
    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-120px);
    }
}

/* CONTENEDOR */

.container{
    width:100%;
    max-width:600px;

    margin:auto;

    padding:80px 14px 30px;
}

/* IMAGEN */

.guia-img{
    width:100%;

    border-radius:28px;

    border:2px solid rgba(255,215,0,0.22);

    box-shadow:
        0 0 25px rgba(255,215,0,0.12),
        0 0 60px rgba(255,180,0,0.08);

    animation:fadeUp 0.7s ease;

    transition:0.35s ease;
    position:relative;
    overflow:hidden;
}

.guia-img:hover{
    transform:scale(1.01);
}

.guia-img::before{
    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.08),
        transparent
    );

    transform:translateX(-120%);

    transition:0.7s;
}

.guia-img:hover::before{
    transform:translateX(120%);
}

/* ANIMACION */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* BOTON VOLVER */

.btn-volver{
    position:fixed;

    top:18px;
    left:18px;

    width:58px;
    height:58px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    text-decoration:none;

    color:white;

    font-size:24px;

    background:
    linear-gradient(
        135deg,
        #ffd700,
        #ff8c00
    );

    box-shadow:
        0 0 20px rgba(255,215,0,0.5),
        0 0 45px rgba(255,140,0,0.22);

    z-index:999;

    overflow:hidden;

    transition:0.25s ease;
}

/* BRILLO */

.btn-volver::before{
    content:"";

    position:absolute;

    top:0;
    left:-120%;

    width:100%;
    height:100%;

    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.35),
        transparent
    );

    transition:0.6s;
}

.btn-volver:hover::before{
    left:120%;
}

/* HOVER */

.btn-volver:hover{
    transform:scale(1.08);
}

/* SOPORTE */

.support-btn{
    position:fixed;

    bottom:22px;
    right:22px;

    width:68px;
    height:68px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
    linear-gradient(
        135deg,
        #00c853,
        #009624
    );

    color:white;

    font-size:30px;

    cursor:pointer;

    z-index:999;

    box-shadow:
        0 0 22px rgba(0,255,120,0.35);

    animation:pulseSupport 2s infinite;
}

@keyframes pulseSupport{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }

}

/* MOBILE */

@media(max-width:480px){

    .btn-volver{
        width:52px;
        height:52px;

        font-size:20px;
    }

    .support-btn{
        width:58px;
        height:58px;

        font-size:24px;
    }

}

/* TOP CARD */

.top-card{
    display:flex;
    align-items:center;
    gap:16px;

    margin-bottom:20px;

    padding:18px;

    border-radius:24px;

    background:rgba(0,0,0,0.42);

    border:2px solid rgba(255,215,0,0.18);

    backdrop-filter:blur(10px);

    box-shadow:
        0 0 22px rgba(255,215,0,0.08);
}

/* ICONO */

.top-icon{
    min-width:72px;
    height:72px;

    border-radius:22px;

    background:
    linear-gradient(
        135deg,
        #00ff99,
        #00c853
    );

    display:flex;
    align-items:center;
    justify-content:center;

    box-shadow:
        0 0 22px rgba(0,255,120,0.35);
}

.top-icon i{
    font-size:34px;
    color:white;
}

/* TEXTO */

.top-text{
    text-align:left;
}

.top-text h2{
    font-size:26px;
    font-weight:900;

    color:white;
}

.top-text p{
    margin-top:4px;

    color:#bbbbbb;

    font-size:15px;
}

.tip-box{
    margin-top:18px;

    padding:16px;

    border-radius:20px;

    background:
    rgba(0,0,0,0.45);

    border:1px solid rgba(0,255,120,0.18);

    color:#00ff99;

    font-weight:700;

    font-size:15px;

    box-shadow:
        0 0 18px rgba(0,255,120,0.08);

    backdrop-filter:blur(8px);
}

</style>
</head>

<body>

<div class="particles"></div>

<a href="index.html" class="btn-volver">
    <i class="fa-solid fa-arrow-left"></i>
</a>

<div class="support-btn" onclick="irWhatsApp()">
    <i class="fa-solid fa-headset"></i>
</div>

<div class="container">

    <div class="top-card">

    <div class="top-icon">
        <i class="fa-solid fa-money-bill-wave"></i>
    </div>

    <div class="top-text">

        <h2>GUÍA DE RETIRO</h2>

        <p>
            Retirá tu dinero rápido y seguro
        </p>

    </div>

</div>

    <img src="como retirar.jpg"
    class="guia-img">

    <div class="tip-box">
    ⚡ Consejo: verificá bien tu alias antes de retirar dinero
</div>

</div>

<script>

window.addEventListener("load", ()=>{

    document.body.classList.add("loaded");

});

/* WHATSAPP */

function irWhatsApp(){

    const numeros = [
        "595992369719",
        "595971104166",
        "595976114458"
    ];

    const elegido =
    numeros[Math.floor(Math.random()*numeros.length)];

    const mensaje =
    encodeURIComponent("Hola, necesito ayuda para retirar");

    window.open(
    `https://wa.me/${elegido}?text=${mensaje}`,
    "_blank");

}

</script>

</body>
</html>
