<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cómo cargar</title>

<style>
body {
    margin: 0;
    background: black;
    text-align: center;
}

/* IMAGEN */
img {
    width: 100%;
    height: auto;
}

/* BOTON VOLVER */
.volver {
    position: fixed;
    top: 15px;
    left: 15px;
    background: gold;
    color: black;
    padding: 10px 15px;
    border-radius: 10px;
    font-weight: bold;
    text-decoration: none;
    z-index: 1000;
}

/* BOTON WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
    text-decoration: none;
    box-shadow: 0 0 15px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<!-- BOTON VOLVER -->
<a href="index.html" class="volver">⬅ Volver</a>

<!-- IMAGEN -->
<img src="como cargar.png">

</body>
</html>
