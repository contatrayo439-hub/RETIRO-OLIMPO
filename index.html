<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASINO OLIMPO</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;
    min-height: 100vh;
    overflow-x: hidden;

    background: url('fondo.png') no-repeat center center;
    background-size: cover;
    opacity: 1;
    transition: opacity 0.4s ease;
}

/* ✨ GRADIENTE EN MOVIMIENTO */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65); /* OSCURECE FONDO */
    z-index: -1;
}

@keyframes moveGlow {
    0% {
        transform: translate(-10%, -10%) scale(1);
    }
    100% {
        transform: translate(10%, 10%) scale(1.2);
    }
}

/* 🔥 DESTELLOS */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 70% 60%, rgba(255,140,0,0.25), transparent 60%);
    animation: moveGlow 8s infinite alternate ease-in-out;
    z-index: -1;
}

@keyframes sparkle {
    from { transform: translateY(0); }
    to { transform: translateY(20px); }
}

/* PARTICULAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* CONTENEDOR */
.container {
    max-width: 420px;
    margin: auto;
    text-align: center;
    padding: 20px;

    opacity: 0;
    transform: translateY(30px) scale(0.95);
    transition: 0.8s ease;
    position: relative;
    z-index: 2;
    backdrop-filter: blur(1px);

}

.container.show {
    opacity: 1;
    transform: translateY(0) scale(1);
}

/* LOGO */
.logo {
    position: relative;
}

.logo img {
    width: 120px;
    margin-top: 20px;

    border-radius: 50%;
    border: 2px solid gold;

    box-shadow:
        0 0 15px gold,
        0 0 40px rgba(255,215,0,0.6);

    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0); }
}

/* ARO */
.logo::before {
    content: "";
    position: absolute;
    width: 170px;
    height: 170px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border-top: 3px solid gold;
    border-bottom: 3px solid orange;
    animation: spin 4s linear infinite;
    box-shadow: 0 0 25px orange;
}

@keyframes spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* TITULO */
.title {
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 1px;
    padding: 14px 30px;
    border-radius: 16px;
    display: inline-block;

    margin-top: 15px;

    background: rgba(0,0,0,0.75);

    border: 2px solid #ff8c00;

    color: gold;

    box-shadow:
        0 0 20px #ff8c00,
        0 0 50px rgba(255,140,0,0.7),
        inset 0 0 10px rgba(255,255,255,0.15);

    text-shadow:
    0 0 10px rgba(255,215,0,0.7);
}

/* SUB */
.subtitle {
    color: #00ffc8;
    font-size: 32px;
    font-weight: 600;
    margin-top: 5px;


    background: linear-gradient(90deg, #00ff88, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow:
        0 0 20px rgba(0,255,136,0.7),
        0 0 30px rgba(255,215,0,0.6);

            color: #00ffcc;
    font-weight: bold;
    text-shadow: 0 0 8px rgba(0,255,200,0.4);
}

/* CONTADOR */
.counter {
    font-size: 13px;
    color: #00ff9c;
    margin-bottom: 15px;
    animation: blink 1.5s infinite;
}

@keyframes blink {
    50% { opacity: 0.4; }
}

/* BOTON */
.btn {
    display: block;
    width: 100%;
    margin: 25px auto;
    padding: 16px;

    border-radius: 12px;

    font-size: 16px;
    font-weight: 700;

    text-decoration: none;
    color: black;

    background: linear-gradient(90deg, #ffd700, #ff8c00);

    box-shadow:
        0 5px 15px rgba(255,140,0,0.4);

    transition: 0.2s;
}

.btn:active {
    transform: scale(0.97);
}

.btn:hover {
    transform: scale(1.1);
}

/* HOVER */
.btn:hover {
    transform: scale(1.08);
    box-shadow:
        0 0 30px rgba(255,215,0,1),
        0 0 60px rgba(255,140,0,0.9);
}

@keyframes pulseBtn {
    50% { transform: scale(1.08); }
}

.btn::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 18px;
    box-shadow: 0 0 20px gold;
    opacity: 0;
    transition: 0.3s;
}

.btn:hover::after {
    opacity: 1;
}

.btn-volver {
    display: inline-block;
    margin: 20px;
    padding: 14px 28px;

    font-size: 16px;
    font-weight: 800;
    letter-spacing: 1px;

    color: #000;
    text-decoration: none;

    border-radius: 14px;

    background: linear-gradient(135deg, #ffd700, #ff8c00);

    box-shadow:
        0 0 15px rgba(255,215,0,0.8),
        0 0 40px rgba(255,140,0,0.6),
        inset 0 0 8px rgba(255,255,255,0.6);

    transition: 0.3s ease;
    position: relative;
}

/* 🔥 BRILLO QUE PASA */
.btn-volver::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.7), transparent);
}

.btn-volver:hover::before {
    left: 100%;
    transition: 0.5s;
}

/* 💥 HOVER */
.btn-volver:hover {
    transform: scale(1.08);
    box-shadow:
        0 0 25px gold,
        0 0 60px orange;
}

/* CARDS */
.card {
    width: 100%;
    margin: 12px auto;
    padding: 14px;

    border-radius: 12px;

    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.1);

    display: flex;
    justify-content: space-between;
    align-items: center;

    font-size: 14px;

    transition: 0.2s;
}

.card:active {
    transform: scale(0.97);
    border-color: gold;
}

.card:hover {
    border-color: #00ff88;

    box-shadow:
        0 0 25px #00ff88,
        0 0 50px rgba(0,255,136,0.6);

    transform: scale(1.05);
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
    font-size: 22px;
    text-decoration: none;
    color: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

html {
    background: #000;
}

.rayos {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: url('https://i.imgur.com/3QZQZQk.png') center/cover no-repeat;
    opacity: 0.03;
    animation: flash 6s infinite;
    z-index: 0;
}

@keyframes flash {
    0%, 90%, 100% { opacity: 0.05; }
    95% { opacity: 0.25; }
}

.coins {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
}

.coin {
    position: absolute;
    width: 12px;
    height: 12px;
    background: gold;
    border-radius: 50%;
    box-shadow: 0 0 10px gold;
    animation: fall linear infinite;
}

@keyframes fall {
    from {
        transform: translateY(-10vh);
        opacity: 1;
    }
    to {
        transform: translateY(110vh);
        opacity: 0;
    }
}
.secure-text {
    font-size: 18px;
    font-weight: bold;
    margin-top: 10px;

    color: #00ff88;

    text-shadow:
        0 0 10px rgba(0,255,136,0.8),
        0 0 20px rgba(0,255,136,0.5);
}
.fijo {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 999;
    padding: 12px 16px;
    border-radius: 50%;
    font-size: 18px;
}

#loader {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.spinner {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 4px solid rgba(255,215,0,0.2);
    border-top: 4px solid gold;
    animation: spin 1s linear infinite;
}

.btn:active,
.card:active,
.btn-volver:active {
    transform: scale(0.95);
}

* {
    -webkit-tap-highlight-color: transparent;
}

</style>
</head>
<div id="loader">
    <div class="spinner"></div>
</div>
<body>

    
<canvas id="particles"></canvas>

<div class="coins"></div>

<div class="container show">

    <div class="logo">
        <img src="logo/logo.png">
    </div>

    <div class="title">PLATAFORMA</div>
    <div class="subtitle">RÁPIDO Y SEGURO</div>

    <div class="counter">🔥 120 jugadores en línea</div>

    <!-- BOTON BIEN HECHO -->
<a onclick="irWhatsApp()" class="btn">
    ⚡ CARGÁ AHORA 🎰
</a>

    <!-- TEXTO -->
    <div class="secure-text">
        RETIRÁ Y CARGÁ SEGURO
    </div>

    <!-- CARDS -->
    <div class="card" onclick="irA('cargar.html')">
        <span>¿CÓMO HAGO PARA CARGAR DESDE LA PLATAFORMA?</span> ➡️
    </div>

    <div class="card" onclick="irA('retirar.html')">
        <span>¿CÓMO HAGO PARA RETIRAR MI DINERO?</span> ➡️
    </div>

</div>


<script>
// PARTICULAS
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 120; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2.5,
        speedY: Math.random() * 0.8 + 0.2,
        opacity: Math.random() * 0.4
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.y += p.speedY;

        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random() * canvas.width;
        }

        ctx.fillStyle = "rgba(255,215,0,0.4)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();

// CONTADOR
let n = 120;
setInterval(() => {
    n += Math.floor(Math.random() * 3);
    document.querySelector(".counter").innerText = "🔥 " + n + " jugadores en línea";
}, 3000);

// MONEDAS
const coinsContainer = document.querySelector('.coins');

for (let i = 0; i < 30; i++) {
    let coin = document.createElement('div');
    coin.classList.add('coin');

    coin.style.left = Math.random() * 100 + "vw";
    coin.style.animationDuration = (Math.random() * 3 + 2) + "s";
    coin.style.animationDelay = Math.random() * 5 + "s";

    coinsContainer.appendChild(coin);
}

// VIBRACIÓN
document.querySelectorAll('.btn, .card').forEach(el => {
    el.addEventListener('click', () => {
        if (navigator.vibrate) navigator.vibrate([20, 30, 20]);
    });
});

// 🔥 TRANSICIÓN GLOBAL (FUNCIONA EN TODO)
function irA(url) {
    document.body.classList.remove("loaded");
    setTimeout(() => {
        window.location.href = url;
    }, 300);
}

// LINKS
document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function(e) {
        const href = this.getAttribute("href");

        if (href && !href.startsWith("#")) {
            e.preventDefault();
            irA(href);
        }
    });
});

// LOADER + FADE IN
window.addEventListener("load", () => {
    document.body.classList.add("loaded");

    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
    }, 500);
});

// Mostrar siempre aunque falle algo
setTimeout(() => {
    document.body.classList.add("loaded");

    const loader = document.getElementById("loader");
    if (loader) loader.style.display = "none";
}, 600);

function irWhatsApp() {
    const numeros = [
        "595992369719",
        "595971104166",
        "595976114458"
    ];

    const elegido = numeros[Math.floor(Math.random() * numeros.length)];

    const mensaje = encodeURIComponent("Hola, quiero cargar saldo");

    window.open(`https://wa.me/${elegido}?text=${mensaje}`, "_blank");
}
</script>

<div class="rayos"></div>

</body>
</html>
