<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASINO OLIMPO</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;
    min-height: 100vh;
    overflow-x: hidden;

    background: url('fondo.png') no-repeat center center;
    background-size: cover;

    opacity: 0;
    transition: opacity 0.4s ease;
}

/* OVERLAY OSCURO */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.5),
        rgba(0,0,0,0.8)
    );
    z-index: -1;
}

/* DESTELLO */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 70% 60%, rgba(255,140,0,0.2), transparent 60%);
    animation: glow 8s infinite alternate ease-in-out;
    z-index: -1;
}

@keyframes glow {
    from { transform: scale(1); }
    to { transform: scale(1.2); }
}

body.loaded {
    opacity: 1;
}

/* CONTENEDOR */
.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
    text-align: center;

    display: flex;
    flex-direction: column;
    gap: 16px;

    transform: translateY(30px);
    opacity: 0;
    transition: 0.6s ease;
}

.container.show {
    transform: translateY(0);
    opacity: 1;
}

/* LOGO */
.logo img {
    width: 110px;
    border-radius: 50%;
    border: 2px solid rgba(255,215,0,0.5);
    box-shadow: 0 0 20px rgba(255,215,0,0.4);
}

/* TITULO */
.title {
    font-size: 30px;
    font-weight: 800;
    padding: 12px;
    border-radius: 12px;

    background: rgba(0,0,0,0.7);
    color: gold;

    border: 1px solid rgba(255,215,0,0.3);
}

/* SUB */
.subtitle {
    color: #00ffc8;
    font-size: 18px;
    font-weight: 700;
    text-shadow: 0 0 8px rgba(0,255,200,0.6);
}

/* CONTADOR */
.counter {
    font-size: 13px;
    color: #00ff9c;
}

/* BOTON */
.btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;

    font-weight: bold;
    font-size: 16px;

    background: linear-gradient(90deg, #ffd700, #ff8c00);
    color: black;

    border: none;

    box-shadow: 0 8px 25px rgba(255,140,0,0.3);

    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow:
        0 0 20px rgba(255,215,0,0.8),
        0 0 40px rgba(255,140,0,0.5);
}

.btn:active {
    transform: scale(0.95);
}

/* TEXTO */
.secure-text {
    color: #00ff88;
    font-weight: bold;
}

/* CARDS */
.card {
    padding: 14px;
    border-radius: 12px;

    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.08);

    display: flex;
    justify-content: space-between;

    font-size: 14px;

    transition: 0.2s;
}

.card:hover {
    border-color: #00ff88;
    transform: scale(1.03);
}

/* LOADER */
#loader {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.spinner {
    width: 60px;
    height: 60px;
    border: 4px solid rgba(255,215,0,0.2);
    border-top: 4px solid gold;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<div class="container show">

    <div class="logo">
        <img src="logo/logo.png">
    </div>

    <div class="title">PLATAFORMA</div>

    <div class="subtitle">RÁPIDO Y SEGURO</div>

    <div class="counter">🔥 120 jugadores en línea</div>

    <a href="#" onclick="irWhatsApp(); return false;" class="btn">
        ⚡ CARGÁ AHORA 🎰
    </a>

    <div class="secure-text">
        RETIRÁ Y CARGÁ SEGURO
    </div>

    <div class="card" onclick="irA('cargar.html')">
        <span>¿CÓMO CARGAR?</span> ➡️
    </div>

    <div class="card" onclick="irA('retirar.html')">
        <span>¿CÓMO RETIRAR?</span> ➡️
    </div>

</div>

<script>
// LOADER
window.addEventListener("load", () => {
    document.body.classList.add("loaded");

    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
    }, 500);
});

// REDIRECCION
function irA(url) {
    document.body.classList.remove("loaded");
    setTimeout(() => {
        window.location.href = url;
    }, 300);
}

// WHATSAPP RANDOM
function irWhatsApp() {
    const numeros = [
        "595992369719",
        "595971104166",
        "595976114458"
    ];

    const elegido = numeros[Math.floor(Math.random() * numeros.length)];

    const mensaje = encodeURIComponent("Hola, quiero cargar saldo");

    window.open(`https://wa.me/${elegido}?text=${mensaje}`, "_blank");
}

// CONTADOR
let n = 120;
setInterval(() => {
    n += Math.floor(Math.random() * 3);
    document.querySelector(".counter").innerText = "🔥 " + n + " jugadores en línea";
}, 3000);
</script>

</body>
</html>
