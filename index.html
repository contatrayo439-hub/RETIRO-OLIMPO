<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰CASINO OLIMPO</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* {
    -webkit-tap-highlight-color: transparent;
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    min-height: 100vh;
    overflow-x: hidden;

    background: url('fondo.png') no-repeat center center;
    background-size: cover;

    opacity: 0;
    transition: opacity 0.4s ease;
}

body.loaded { opacity: 1; }

/* OVERLAY */
body::before {
    content: "";
    position: fixed;
    inset: 0;
   background:
linear-gradient(
    to bottom,
    rgba(0,0,0,0.45),
    rgba(0,0,0,0.82)
),
radial-gradient(
    circle at top,
    rgba(255,215,0,0.08),
    transparent 45%
);
    z-index: -1;
}

/* CONTENEDOR */
.container {
    max-width: 460px;
    margin: auto;
    padding: 32px 20px 20px;
    text-align: center;

    display: flex;
    flex-direction: column;
    gap: 18px;

    transform: translateY(20px);
    opacity: 0;
    transition: 0.6s ease;
}

.container.show {
    transform: translateY(0);
    opacity: 1;
}

/* LOGO */
.logo img {
    width: 125px;
    border-radius: 50%;
    border: 2px solid rgba(255,215,0,0.6);
    box-shadow: 0 0 25px rgba(255,215,0,0.5);
    backdrop-filter: blur(4px);

    animation:
    float 4s ease-in-out infinite,
    logoGlow 2s infinite alternate;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0); }
}

@keyframes logoGlow {

    from {
        box-shadow:
            0 0 15px rgba(255,215,0,0.4),
            0 0 30px rgba(255,215,0,0.15);
    }

    to {
        box-shadow:
            0 0 30px rgba(255,215,0,0.9),
            0 0 60px rgba(255,180,0,0.3);
    }

}

/* TITULO */
.title {
    font-size: 42px;
    font-weight: 900;

    padding: 14px 20px;

    border-radius: 18px;

    background: rgba(0,0,0,0.72);

    color: gold;

    border: 2px solid rgba(255,215,0,0.25);

    text-shadow:
        0 0 10px rgba(255,215,0,0.8),
        0 0 25px rgba(255,180,0,0.4);

    box-shadow:
        0 0 25px rgba(255,215,0,0.18);

    letter-spacing: 2px;

    backdrop-filter: blur(8px);
}

/* SUB */
.subtitle {
    display: inline-block;

    padding: 10px 20px;
    border-radius: 14px;

    background: rgba(0,0,0,0.65);

    border: 1px solid rgba(0,255,200,0.3);

    color: #00ffd0;

    font-size: 22px;
    font-weight: 900;

    letter-spacing: 1px;

    text-shadow:
        0 0 10px rgba(0,255,200,0.8),
        0 0 20px rgba(0,255,200,0.5);

    box-shadow:
        0 0 20px rgba(0,255,200,0.15);

    backdrop-filter: blur(6px);
}

/* CONTADOR */
.counter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-width: 260px;
    transition: 0.25s;

    padding: 12px 22px;

    margin: auto;

    border-radius: 18px;

    background: rgba(0, 0, 0, 0.65);

    border: 2px solid rgba(0,255,170,0.4);

    color: white;

    font-size: 18px;
    font-weight: 800;

    letter-spacing: 0.5px;

    backdrop-filter: blur(8px);

    box-shadow:
        0 0 10px rgba(0,255,170,0.3),
        0 0 25px rgba(0,255,170,0.2),
        inset 0 0 10px rgba(0,255,170,0.1);

    text-shadow:
        0 0 10px rgba(255,255,255,0.2);

    animation: pulseCounter 2s infinite alternate;
    position: relative;
    overflow: hidden;
}

/* FLECHA */

#trend{
    font-size:20px;
    font-weight:900;

    margin-left:4px;

    transition:0.25s;
}

/* STATUS */

#statusIcon{
    font-size:16px;

    animation:pulseStatus 1.5s infinite;
}

@keyframes pulseStatus{

    0%{
        opacity:0.5;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.5;
    }

}
.counter::before {
    content: "";

    position: absolute;

    top: 0;
    left: -120%;

    width: 100%;
    height: 100%;

    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.12),
        transparent
    );

    transition: 0.8s;
}

.counter:hover::before {
    left: 120%;
}

@keyframes pulseCounter {
    from {
        box-shadow:
            0 0 10px rgba(0,255,170,0.3),
            0 0 20px rgba(0,255,170,0.15);
    }

    to {
        box-shadow:
            0 0 18px rgba(0,255,170,0.7),
            0 0 35px rgba(0,255,170,0.35);
    }
}


/* RIPPLE */
.btn:active::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: radial-gradient(circle, rgba(255,255,255,0.4), transparent);
    animation: ripple 0.4s;
}

@keyframes ripple {
    from { transform: scale(0); }
    to { transform: scale(1); opacity: 0; }
}

/* TEXTO */
.secure-text {
    display: inline-block;

    padding: 10px 18px;

    border-radius: 12px;

    background: rgba(0,0,0,0.55);

    border: 1px solid rgba(0,255,136,0.2);

    color: #00ff88;

    font-weight: 900;
    font-size: 20px;

    text-shadow:
        0 0 10px rgba(0,255,136,0.8);

    box-shadow:
        0 0 15px rgba(0,255,136,0.15);

    backdrop-filter: blur(4px);
}


/* LOADER */
#loader {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.spinner {
    width: 60px;
    height: 60px;
    border: 4px solid rgba(255,215,0,0.2);
    border-top: 4px solid gold;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* FLASH */
.flash {
    position: fixed;
    inset: 0;
    background: rgba(255,215,0,0.2);
    opacity: 0;
    pointer-events: none;
    transition: 0.2s;
}

.flash.active {
    opacity: 1;
}


@keyframes glowJuego {
    from {
        box-shadow: 0 0 10px rgba(0,255,200,0.4);
    }
    to {
        box-shadow: 0 0 30px rgba(0,255,200,1);
    }
}


/* =========================
   BOTONES PRINCIPALES
========================= */

.btn-group {
    display: flex;
    gap: 16px;
    width: 100%;

    align-items: stretch;
}

/* BOTON */

.btn {
    flex: 1;

    min-height: 90px;

    border: none;
    border-radius: 24px;

    padding: 16px;

    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;

    cursor: pointer;

    position: relative;
    overflow: hidden;

    transition: all 0.28s ease;
}

/* ICONOS */

.btn i {
    font-size: clamp(24px, 4vw, 36px);

    flex-shrink: 0;

    filter: drop-shadow(0 0 12px rgba(255,255,255,0.45));
}

/* TEXTO */

.btn-text {
    display: flex;
    flex-direction: column;

    text-align: center;

    justify-content: center;

    line-height: 1;
}

/* TEXO RESPONSIVE */

.btn-text span {
    font-size: clamp(15px, 3vw, 22px);

    font-weight: 900;

    letter-spacing: 1px;

    line-height: 1;

    text-transform: uppercase;

    text-shadow:
        0 0 10px rgba(255,255,255,0.15);
}

/* JUGAR */

.jugar {
    background: linear-gradient(135deg, #00ffe1, #00b894);

    color: white;

    box-shadow:
        0 0 20px rgba(0,255,200,0.5),
        inset 0 0 20px rgba(255,255,255,0.15);

    animation: glowJuego 2s infinite alternate;
}

/* CARGAR */

.cargar {
    background: linear-gradient(135deg, #ffcc00, #ff9500);

    color: white;

    box-shadow:
        0 0 20px rgba(255,180,0,0.5),
        inset 0 0 20px rgba(255,255,255,0.15);
}

/* HOVER */

.btn:hover {
    transform: translateY(-3px) scale(1.02);
}

.btn::before {
    content: "";

    position: absolute;

    top: 0;
    left: -120%;

    width: 100%;
    height: 100%;

    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.18),
        transparent
    );

    transition: 0.6s;
}

.btn:hover::before {
    left: 120%;
}

/* CLICK */

.btn:active {
    transform: scale(0.96);
}

/* =========================
   MOBILE
========================= */

@media (max-width: 600px) {

    .btn-group {
        gap: 10px;
    }

    .btn {
        min-height: 78px;

        padding: 12px;
        border-radius: 18px;
    }

    .btn-text span {
        font-size: 15px;
    }

    .btn i {
        font-size: 28px;
    }

}

/* =========================
   PC GRANDE
========================= */

@media (min-width: 1000px) {

    .container {
        max-width: 520px;
    }

    .btn {
        min-height: 100px;
    }

}


/* INFO BUTTONS */

.info-btn {
    width: 100%;

    margin-top: 16px;
    padding: 18px 22px;

    border-radius: 24px;

    background: rgba(0, 0, 0, 0.35);

    border: 2px solid rgba(255, 215, 0, 0.25);

    backdrop-filter: blur(10px);

    display: flex;
    align-items: center;
    justify-content: space-between;

    cursor: pointer;

    position: relative;
    overflow: hidden;

    transition: all 0.28s ease;

    box-shadow:
        0 0 15px rgba(255,215,0,0.15),
        inset 0 0 12px rgba(255,255,255,0.03);
}

/* EFECTO GLASS */

.info-btn::before {
    content: "";

    position: absolute;

    top: 0;
    left: -120%;

    width: 100%;
    height: 100%;

    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.08),
        transparent
    );

    transition: 0.6s;
}

.info-btn:hover::before {
    left: 120%;
}

.info-btn:hover {
    transform: scale(1.02);

    border-color: gold;

    box-shadow:
        0 0 25px rgba(255,215,0,0.35),
        0 0 40px rgba(255,180,0,0.12);
}

/* IZQUIERDA */

.info-left {
    display: flex;
    align-items: center;
    gap: 16px;

    text-align: left;
}

/* TEXTO */

.info-left span {
    color: white;

    font-size: 20px;
    font-weight: 700;

    line-height: 1.2;

    text-shadow:
        0 0 8px rgba(255,255,255,0.12);
}

/* ICONO CIRCULAR */

.icon-circle {
    min-width: 64px;
    height: 64px;

    border-radius: 50%;

    background: rgba(255, 200, 0, 0.12);

    border: 2px solid rgba(255,215,0,0.45);

    display: flex;
    align-items: center;
    justify-content: center;

    backdrop-filter: blur(6px);

    box-shadow:
        0 0 18px rgba(255,215,0,0.35),
        inset 0 0 12px rgba(255,255,255,0.05);
}

/* ICONOS */

.icon-circle i {
    font-size: 30px;

    color: gold;

    text-shadow:
        0 0 12px rgba(255,215,0,0.7);
}

/* FLECHA */

.arrow-box {
    min-width: 56px;
    height: 56px;

    border-radius: 16px;

    background: rgba(255, 200, 0, 0.08);

    border: 2px solid rgba(255,215,0,0.3);

    display: flex;
    align-items: center;
    justify-content: center;

    box-shadow:
        0 0 15px rgba(255,215,0,0.2);
}

/* ICONO FLECHA */

.arrow-box i {
    font-size: 24px;

    color: gold;

    text-shadow:
        0 0 10px rgba(255,215,0,0.6);
}

/* WHATSAPP */

.whatsapp-channel {
    margin-top: 8px;

    padding: 18px;

    border-radius: 24px;

    background: linear-gradient(135deg, #00c853, #009624);

    display: flex;
    align-items: center;
    gap: 18px;

    cursor: pointer;

    transition: all 0.28s ease;

    box-shadow:
        0 0 25px rgba(0,255,120,0.35);
}

.whatsapp-channel:hover {
    transform: scale(1.02);
}

.whatsapp-icon {
    min-width: 70px;
    height: 70px;

    border-radius: 50%;

    background: rgba(255,255,255,0.12);

    display: flex;
    align-items: center;
    justify-content: center;
}

.whatsapp-icon i {
    font-size: 42px;
    color: white;
}

.whatsapp-text {
    text-align: left;

    font-size: 20px;
    font-weight: 700;

    line-height: 1.2;

    color: white;
}

.whatsapp-text span {
    color: #8dff5f;
}

.logo-glow {
    width: 180px;
    height: 12px;

    margin: -5px auto 5px auto;

    border-radius: 50%;

    background: radial-gradient(circle,
        rgba(255,215,0,0.85),
        rgba(255,180,0,0.35),
        transparent);

    filter: blur(10px);

    animation: pulseGlow 2s infinite alternate;
}

@keyframes pulseGlow {
    from {
        opacity: 0.6;
        transform: scaleX(0.9);
    }

    to {
        opacity: 1;
        transform: scaleX(1.1);
    }
}

@media (max-width: 480px) {

    .subtitle {
        font-size: 18px;
        padding: 10px 14px;
    }

    .counter {
        font-size: 15px;
        padding: 10px 16px;
    }

    .secure-text {
        font-size: 16px;
    }

    .info-left span {
        font-size: 15px;
    }

    .whatsapp-text {
        font-size: 16px;
    }

    .icon-circle {
        min-width: 52px;
        height: 52px;
    }

    .icon-circle i {
        font-size: 22px;
    }

    .arrow-box {
        min-width: 46px;
        height: 46px;
    }

    .arrow-box i {
        font-size: 18px;
    }

    .whatsapp-channel {
        padding: 14px;
        gap: 12px;
    }

    .whatsapp-icon {
        min-width: 58px;
        height: 58px;
    }

.whatsapp-icon i {
        font-size: 32px;
    }
}

@media (max-width: 380px) {

    .btn-group {
        flex-direction: column;
    }

    .btn {
        width: 100%;
    }

}

.particles {
    position: fixed;
    inset: 0;

    pointer-events: none;

    background-image:
        radial-gradient(rgba(255,215,0,0.35) 1px, transparent 1px);

    background-size: 35px 35px;

    opacity: 0.18;

    animation: particlesMove 18s linear infinite;

    z-index: -1;
}

@keyframes particlesMove {
    from {
        transform: translateY(0);
    }

    to {
        transform: translateY(-120px);
    }
}

.support-btn {
    position: fixed;

    bottom: 22px;
    right: 22px;

    width: 68px;
    height: 68px;

    border-radius: 50%;

    background: linear-gradient(135deg, #ffcc00, #ff9500);

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 30px;
    color: black;

    cursor: pointer;

    z-index: 999;

    box-shadow:
        0 0 20px rgba(255,180,0,0.5);

    animation: pulseSupport 2s infinite;
}

@keyframes pulseSupport {

    0% {
        transform: scale(1);
    }

    50% {
        transform: scale(1.08);
    }

    100% {
        transform: scale(1);
    }

}
@media (max-width: 480px) {

    .support-btn {
        width: 58px;
        height: 58px;

        font-size: 24px;

        bottom: 18px;
        right: 18px;
    }

}

/* MONEY RAIN */

.money-rain{
    position:fixed;

    inset:0;

    pointer-events:none;

    overflow:hidden;

    z-index:-1;
}

/* ITEMS */

.money-rain span{
    position:absolute;

    top:-10%;

    font-size:28px;

    opacity:0.12;

    filter:
    drop-shadow(0 0 10px rgba(255,215,0,0.45));

    animation:
    fall linear infinite,
    sway ease-in-out infinite;
}

/* POSICIONES */

.money-rain span:nth-child(1){
    left:8%;
    animation-duration:14s;
}

.money-rain span:nth-child(2){
    left:20%;
    animation-duration:18s;
    font-size:22px;
}

.money-rain span:nth-child(3){
    left:34%;
    animation-duration:15s;
}

.money-rain span:nth-child(4){
    left:48%;
    animation-duration:19s;
    font-size:24px;
}

.money-rain span:nth-child(5){
    left:62%;
    animation-duration:13s;
}

.money-rain span:nth-child(6){
    left:74%;
    animation-duration:17s;
}

.money-rain span:nth-child(7){
    left:86%;
    animation-duration:16s;
}

.money-rain span:nth-child(8){
    left:94%;
    animation-duration:20s;
}

/* CAIDA */

@keyframes fall{

    from{
        transform:
        translateY(-10vh)
        rotate(0deg);
    }

    to{
        transform:
        translateY(120vh)
        rotate(360deg);
    }

}

/* MOVIMIENTO */

@keyframes sway{

    0%{
        margin-left:0;
    }

    50%{
        margin-left:18px;
    }

    100%{
        margin-left:0;
    }

}

</style>
</head>

</div>

    <span>💸</span>
    <span>₲</span>
    <span>💰</span>
    <span>₲</span>
    <span>💸</span>

</div>

<script>
// LOADER
window.addEventListener("load", () => {
    document.body.classList.add("loaded");
    document.querySelector(".container").classList.add("show");

    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
    }, 400);
});

// EFECTOS
function vibrar() {
    if (navigator.vibrate) navigator.vibrate([20,30,20]);
}

function sonido() {
    const audio = document.getElementById("clickSound");
    if (audio) {
        audio.currentTime = 0;
        audio.play().catch(()=>{});
    }
}

function flash() {
    const f = document.getElementById("flash");
    f.classList.add("active");
    setTimeout(() => f.classList.remove("active"), 150);
}

// BOTON
function accionCargar() {
    vibrar();
    sonido();
    flash();

    setTimeout(() => {
        irWhatsApp();
    }, 200);
}

// REDIRECCION
function irA(url) {
    vibrar();
    sonido();
    flash();

    document.body.style.opacity = 0;

    setTimeout(() => {
        window.location.href = url;
    }, 300);
}

// WHATSAPP MULTI
function irWhatsApp() {
    const numeros = [
        "595992369719",
        "595971104166",
        "595976114458"
    ];

    const elegido = numeros[Math.floor(Math.random() * numeros.length)];
    const mensaje = encodeURIComponent("Hola, quiero cargar saldo");

    window.open(`https://wa.me/${elegido}?text=${mensaje}`, "_blank");
