<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰CASINO OLIMPO</title>

<style>
* {
    -webkit-tap-highlight-color: transparent;
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;
    min-height: 100vh;
    overflow-x: hidden;

    background: url('fondo.png') no-repeat center center;
    background-size: cover;

    opacity: 0;
    transition: opacity 0.4s ease;
}

body.loaded { opacity: 1; }

/* OVERLAY */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.85));
    z-index: -1;
}

/* CONTENEDOR */
.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
    text-align: center;

    display: flex;
    flex-direction: column;
    gap: 18px;

    transform: translateY(20px);
    opacity: 0;
    transition: 0.6s ease;
}

.container.show {
    transform: translateY(0);
    opacity: 1;
}

/* LOGO */
.logo img {
    width: 110px;
    border-radius: 50%;
    border: 2px solid rgba(255,215,0,0.6);
    box-shadow: 0 0 25px rgba(255,215,0,0.5);

    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0); }
}

/* TITULO */
.title {
    font-size: 30px;
    font-weight: 800;
    padding: 12px;
    border-radius: 12px;

    background: rgba(0,0,0,0.75);
    color: gold;

    border: 1px solid rgba(255,215,0,0.3);
}

/* SUB */
.subtitle {
    color: #00ffc8;
    font-size: 18px;
    font-weight: 700;
}

/* CONTADOR */
.counter {
    font-size: 13px;
    color: #00ff9c;
}

/* BOTON */
.btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;

    font-weight: bold;
    font-size: 16px;

    background: linear-gradient(90deg, #ffd700, #ff8c00);
    color: black;

    border: none;
    cursor: pointer;

    box-shadow: 0 10px 25px rgba(255,140,0,0.3);

    transition: 0.15s;

    position: relative;
    overflow: hidden;
}

.btn:active {
    transform: scale(0.95);
}

/* RIPPLE */
.btn:active::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: radial-gradient(circle, rgba(255,255,255,0.4), transparent);
    animation: ripple 0.4s;
}

@keyframes ripple {
    from { transform: scale(0); }
    to { transform: scale(1); opacity: 0; }
}

/* TEXTO */
.secure-text {
    color: #00ff88;
    font-weight: bold;
}

/* CARDS */
.card {
    padding: 14px;
    border-radius: 12px;

    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.08);

    display: flex;
    justify-content: space-between;

    font-size: 14px;

    transition: 0.15s;

    position: relative;
    overflow: hidden;
}

.card:active {
    transform: scale(0.96);
    border-color: #00ff88;
}

.card:active::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: radial-gradient(circle, rgba(255,255,255,0.2), transparent);
    animation: ripple 0.4s;
}

/* LOADER */
#loader {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.spinner {
    width: 60px;
    height: 60px;
    border: 4px solid rgba(255,215,0,0.2);
    border-top: 4px solid gold;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* FLASH */
.flash {
    position: fixed;
    inset: 0;
    background: rgba(255,215,0,0.2);
    opacity: 0;
    pointer-events: none;
    transition: 0.2s;
}

.flash.active {
    opacity: 1;
}

.whatsapp-channel {
    margin-top: 10px;
    padding: 14px;
    border-radius: 12px;

    font-size: 14px;
    font-weight: bold;

    background: linear-gradient(90deg, #25D366, #1ebe5d);
    color: white;

    cursor: pointer;

    box-shadow: 0 0 15px rgba(37,211,102,0.5);

    transition: 0.2s;
}

.whatsapp-channel:hover {
    transform: scale(1.03);
    box-shadow: 0 0 25px rgba(37,211,102,0.9);
}

.whatsapp-channel:active {
    transform: scale(0.95);
}

.jugar {
    background: linear-gradient(90deg, #00ffcc, #00cc99);
    color: black;
    flex: 1.2;

    font-size: 14px;
    font-weight: 900;

    box-shadow: 
        0 0 15px rgba(0,255,200,0.5),
        0 0 30px rgba(0,255,200,0.3);

    animation: glowJuego 2s infinite alternate;
}

@keyframes glowJuego {
    from {
        box-shadow: 0 0 10px rgba(0,255,200,0.4);
    }
    to {
        box-shadow: 0 0 30px rgba(0,255,200,1);
    }
}

.btn-group {
    display: flex;
    gap: 12px;
}

.btn-group .btn {
    letter-spacing: 0.5px;
    flex: 1;
    padding: 14px;
    font-size: 14px;
}
.btn-group .btn:active {
    transform: scale(0.94);
}

.cargar {
    font-size: 14px;
}
</style>
</head>

<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<div class="flash" id="flash"></div>

<div class="container">

    <div class="logo">
        <img src="logo/logo.png">
    </div>

    <div class="title">PLATAFORMA</div>

    <div class="subtitle">RÁPIDO Y SEGURO</div>

    <div class="counter">🔥 120 jugadores en línea</div>

<div class="btn-group">
    <button class="btn jugar" onclick="irJuego()">
        🎰 JUGAR AHORA
    </button>

    <button class="btn cargar" onclick="accionCargar()">
        ⚡ CARGAR AHORA
    </button>
</div>

    <div class="secure-text">
        RETIRÁ Y CARGÁ SEGURO.
    </div>

    <div class="card" onclick="irA('cargar.html')">
        <span>¿CÓMO HAGO PARA CARGAR DESDE LA PLATAFORMA?</span> ➡️
    </div>

    <div class="card" onclick="irA('retirar.html')">
        <span>¿CÓMO HAGO PARA RETIRAR MI DINERO?</span> ➡️
    </div>

    <div class="whatsapp-channel" onclick="irCanal()">
    📢 No olvides unirte a nuestro canal oficial de WhatsApp
</div>

</div>

<audio id="clickSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8bdfb.mp3"></audio>

<script>
// LOADER
window.addEventListener("load", () => {
    document.body.classList.add("loaded");
    document.querySelector(".container").classList.add("show");

    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
    }, 400);
});

// EFECTOS
function vibrar() {
    if (navigator.vibrate) navigator.vibrate([20,30,20]);
}

function sonido() {
    const audio = document.getElementById("clickSound");
    if (audio) {
        audio.currentTime = 0;
        audio.play().catch(()=>{});
    }
}

function flash() {
    const f = document.getElementById("flash");
    f.classList.add("active");
    setTimeout(() => f.classList.remove("active"), 150);
}

// BOTON
function accionCargar() {
    vibrar();
    sonido();
    flash();

    setTimeout(() => {
        irWhatsApp();
    }, 200);
}

// REDIRECCION
function irA(url) {
    vibrar();
    sonido();
    flash();

    document.body.style.opacity = 0;

    setTimeout(() => {
        window.location.href = url;
    }, 300);
}

// WHATSAPP MULTI
function irWhatsApp() {
    const numeros = [
        "595992369719",
        "595971104166",
        "595976114458"
    ];

    const elegido = numeros[Math.floor(Math.random() * numeros.length)];
    const mensaje = encodeURIComponent("Hola, quiero cargar saldo");

    window.open(`https://wa.me/${elegido}?text=${mensaje}`, "_blank");
}

// CONTADOR
let n = 120;
setInterval(() => {
    n += Math.floor(Math.random() * 3);
    document.querySelector(".counter").innerText = "🔥 " + n + " jugadores en línea";
}, 3000);

function irCanal() {
    vibrar();
    sonido();
    flash();

    setTimeout(() => {
        window.open("https://whatsapp.com/channel/0029Vb69Ttt4SpkFrH03OU0h", "_blank");
    }, 200);
}

function irJuego() {
    vibrar();
    sonido();
    flash();

    setTimeout(() => {
        window.open("https://greenbet.uno/login", "_blank");
    }, 200);
}

</script>

</body>
</html>
