<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASINO OLIMPO</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;
    min-height: 100vh;
    overflow: hidden;

    background: url('fondo.png') no-repeat center center;
    background-size: cover;
}

/* ✨ GRADIENTE EN MOVIMIENTO */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75); /* oscurece fondo */
    z-index: -1;
}

@keyframes moveGlow {
    0% {
        transform: translate(-10%, -10%) scale(1);
    }
    100% {
        transform: translate(10%, 10%) scale(1.2);
    }
}

/* 🔥 DESTELLOS */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 70% 60%, rgba(255,140,0,0.25), transparent 60%);
    animation: moveGlow 8s infinite alternate ease-in-out;
    z-index: -2;
}

@keyframes sparkle {
    from { transform: translateY(0); }
    to { transform: translateY(20px); }
}

/* PARTICULAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* CONTENEDOR */
.container {
    max-width: 420px;
    margin: auto;
    text-align: center;
    padding: 20px;

    opacity: 0;
    transform: translateY(30px) scale(0.95);
    transition: 0.8s ease;
}

.container.show {
    opacity: 1;
    transform: translateY(0) scale(1);
}

/* LOGO */
.logo {
    position: relative;
}

.logo img {
    width: 140px;
    border-radius: 50%;
    position: relative;
}

/* ARO */
.logo::before {
    content: "";
    position: absolute;
    width: 170px;
    height: 170px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border-top: 3px solid gold;
    border-bottom: 3px solid orange;
    animation: spin 4s linear infinite;
    box-shadow: 0 0 25px orange;
}

@keyframes spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* TITULO */
.title {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 2px;

    padding: 14px 30px;
    border-radius: 16px;

    display: inline-block;

    background: linear-gradient(145deg, #000, #0a0a0a);
    color: white;

    border: 2px solid #ff8c00;

    box-shadow:
        0 0 20px #ff8c00,
        0 0 50px rgba(255,140,0,0.7),
        inset 0 0 10px rgba(255,255,255,0.15);
}

/* SUB */
.subtitle {
    font-size: 32px;
    font-weight: 900;

    background: linear-gradient(90deg, #00ff88, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow:
        0 0 20px rgba(0,255,136,0.7),
        0 0 30px rgba(255,215,0,0.6);
}

/* CONTADOR */
.counter {
    font-size: 13px;
    color: #00ff9c;
    margin-bottom: 15px;
    animation: blink 1.5s infinite;
}

@keyframes blink {
    50% { opacity: 0.4; }
}

/* BOTON */
.btn {
    display: block;
    width: 90%;
    max-width: 360px;
    margin: 25px auto;
    padding: 22px;

    border-radius: 20px;

    font-size: 20px;
    font-weight: 900;

    background: linear-gradient(135deg, #ffd700, #ff8c00);
    color: black;

    border: none;

    box-shadow:
        0 0 25px rgba(255,215,0,1),
        0 0 60px rgba(255,140,0,0.8),
        inset 0 0 12px rgba(255,255,255,0.6);

    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

/* HOVER */
.btn:hover {
    transform: scale(1.08);
    box-shadow:
        0 0 30px rgba(255,215,0,1),
        0 0 60px rgba(255,140,0,0.9);
}

@keyframes pulseBtn {
    50% { transform: scale(1.08); }
}

.btn::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 18px;
    box-shadow: 0 0 20px gold;
    opacity: 0;
    transition: 0.3s;
}

.btn:hover::after {
    opacity: 1;
}

/* CARDS */
.card {
    margin: 15px auto;
    width: 90%;
    max-width: 360px;
    padding: 18px;

    border-radius: 16px;

    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);

    border: 2px solid rgba(255,140,0,0.4);

    color: white;

    display: flex;
    justify-content: space-between;
    align-items: center;

    box-shadow:
        0 0 12px rgba(255,140,0,0.5),
        inset 0 0 5px rgba(255,255,255,0.1);

    transition: 0.3s;
}

.card:hover {
    border-color: #00ff88;

    box-shadow:
        0 0 25px #00ff88,
        0 0 50px rgba(0,255,136,0.6);

    transform: scale(1.05);
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
    font-size: 22px;
    text-decoration: none;
    color: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

html {
    background: #000;
}

.rayos {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: url('https://i.imgur.com/3QZQZQk.png') center/cover no-repeat;
    opacity: 0.08;
    animation: flash 6s infinite;
    z-index: 0;
}

@keyframes flash {
    0%, 90%, 100% { opacity: 0.05; }
    95% { opacity: 0.25; }
}

.coins {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
}

.coin {
    position: absolute;
    width: 12px;
    height: 12px;
    background: gold;
    border-radius: 50%;
    box-shadow: 0 0 10px gold;
    animation: fall linear infinite;
}

@keyframes fall {
    from {
        transform: translateY(-10vh);
        opacity: 1;
    }
    to {
        transform: translateY(110vh);
        opacity: 0;
    }
}
.secure-text {
    font-size: 18px;
    font-weight: bold;
    margin-top: 10px;

    color: #00ff88;

    text-shadow:
        0 0 10px rgba(0,255,136,0.8),
        0 0 20px rgba(0,255,136,0.5);
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="coins"></div>

<div class="container show">

    <div class="logo">
        <img src="logo/logo.png">
    </div>

    <div class="title">PLATAFORMA</div>
    <div class="subtitle">RÁPIDO Y SEGURO</div>

    <div class="counter">🔥 120 jugadores en línea</div>

    <!-- BOTON BIEN HECHO -->
    <a href="https://greenbet.uno/login" class="btn">
        ⚡ CARGÁ AHORA 🎰
    </a>

    <!-- TEXTO -->
    <div class="secure-text">
        RETIRÁ Y CARGÁ SEGURO
    </div>

    <!-- CARDS -->
    <div class="card" onclick="window.location.href='cargar.html'">
        <span>¿CÓMO HAGO PARA CARGAR DESDE LA PLATAFORMA?</span> ➡️
    </div>

    <div class="card" onclick="window.location.href='retirar.html'">
        <span>¿CÓMO HAGO PARA RETIRAR MI DINERO?</span> ➡️
    </div>

</div>


<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 120; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2.5,
        speedY: Math.random() * 0.8 + 0.2,
        opacity: Math.random()
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.y += p.speedY;

        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random() * canvas.width;
        }

        ctx.fillStyle = `rgba(255,215,0,${p.opacity})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();

// CONTADOR DINÁMICO
let n = 120;
setInterval(() => {
    n += Math.floor(Math.random() * 3);
    document.querySelector(".counter").innerText = "🔥 " + n + " jugadores en línea";
}, 3000);

const coinsContainer = document.querySelector('.coins');

for (let i = 0; i < 30; i++) {
    let coin = document.createElement('div');
    coin.classList.add('coin');

    coin.style.left = Math.random() * 100 + "vw";
    coin.style.animationDuration = (Math.random() * 3 + 2) + "s";
    coin.style.animationDelay = Math.random() * 5 + "s";

    coinsContainer.appendChild(coin);
}

document.querySelectorAll('.btn, .card').forEach(el => {
    el.addEventListener('click', () => {
        if (navigator.vibrate) {
            navigator.vibrate(40);
        }
    });
});

</script>

<div class="rayos"></div>

</body>
</html>
